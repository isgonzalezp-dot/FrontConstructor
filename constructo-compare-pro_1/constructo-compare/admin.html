<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — ConstructoCompare PRO</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231E3A5F'/><text y='24' x='6' font-size='20'>🔐</text></svg>"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* ── Login page overrides ── */
    body { background: var(--blue-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .login-wrapper {
      width: 100%; max-width: 420px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      margin-bottom: 32px; text-align: center;
    }
    .login-logo img { height: 56px; width: auto; }
    .login-logo-title { font-family: var(--font); font-size: 1.4rem; font-weight: 800; color: #fff; }
    .login-logo-title span { color: var(--orange); }
    .login-logo-sub { font-size: 0.78rem; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }

    .login-card h2 { font-size: 1.1rem; font-weight: 700; color: var(--blue-dark); margin-bottom: 4px; }
    .login-card p  { font-size: 0.825rem; color: var(--gray-400); margin-bottom: 28px; }

    .form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-field label { font-size: 0.78rem; font-weight: 600; color: var(--gray-600); letter-spacing: 0.04em; text-transform: uppercase; }

    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray-400); pointer-events: none; }
    .input-wrap input {
      width: 100%; height: 46px;
      padding: 0 16px 0 42px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: var(--font); font-size: 0.9rem;
      color: var(--gray-900);
      transition: var(--transition);
      outline: none;
      background: var(--gray-50);
    }
    .input-wrap input:focus { border-color: var(--blue-light); background: #fff; box-shadow: 0 0 0 3px rgba(59,114,176,0.12); }
    .input-wrap input.error { border-color: #e53935; }

    .btn-login {
      width: 100%; height: 48px;
      background: var(--blue-dark); color: #fff;
      border-radius: var(--radius-md);
      font-family: var(--font); font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.02em;
      margin-top: 8px;
      transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--blue-mid); box-shadow: var(--shadow-md); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-login .btn-spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-login.loading .btn-spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    .login-error {
      background: #ffebee; color: #c62828;
      border: 1px solid #ffcdd2; border-radius: 8px;
      padding: 10px 14px; font-size: 0.825rem; font-weight: 500;
      margin-bottom: 16px; display: none;
      align-items: center; gap: 8px;
    }
    .login-error.visible { display: flex; }

    .login-demo {
      margin-top: 20px; padding-top: 20px;
      border-top: 1px solid var(--gray-200);
      background: var(--blue-pale); border-radius: 10px;
      padding: 14px 16px;
    }
    .login-demo p { font-size: 0.75rem; color: var(--blue-mid); font-weight: 600; margin-bottom: 6px; }
    .login-demo code { font-family: var(--mono); font-size: 0.78rem; color: var(--gray-600); display: block; line-height: 1.8; }

    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 20px; font-size: 0.825rem; color: rgba(255,255,255,0.5);
      text-decoration: none; transition: var(--transition);
    }
    .back-link:hover { color: rgba(255,255,255,0.85); }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-logo">
    <img src="assets/logo.png" alt="ConstructoCompare PRO"/>
    <div>
      <div class="login-logo-title">ConstructoCompare <span>PRO</span></div>
      <div class="login-logo-sub">Panel de Administración</div>
    </div>
  </div>

  <div class="login-card">
    <h2>Bienvenido de vuelta</h2>
    <p>Ingresa tus credenciales para acceder al panel</p>

    <div class="login-error" id="login-error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-msg">Credenciales incorrectas</span>
    </div>

    <div class="form-field">
      <label for="email">Correo electrónico</label>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" id="email" placeholder="admin@constructo.cl" autocomplete="email"/>
      </div>
    </div>

    <div class="form-field">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <button class="btn-login" id="btn-login">
      <div class="btn-spinner"></div>
      <span class="btn-text">Ingresar al panel</span>
    </button>

    <div class="login-demo">
      <p>🔑 Credenciales de demo</p>
      <code>
        Email: admin@constructo.cl<br/>
        Contraseña: admin123
      </code>
    </div>
  </div>

  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Volver a la aplicación
  </a>
</div>

<script>
  // Mock credentials — reemplazar por POST /auth/login en FastAPI
  const ADMIN_CREDENTIALS = [
    { email: 'admin@constructo.cl', password: 'admin123', nombre: 'Carlos Mendoza', rol: 'admin' }
  ];

  const btnLogin  = document.getElementById('btn-login');
  const emailEl   = document.getElementById('email');
  const passEl    = document.getElementById('password');
  const errorEl   = document.getElementById('login-error');
  const errorMsg  = document.getElementById('error-msg');

  async function handleLogin() {
    const email    = emailEl.value.trim();
    const password = passEl.value;

    if (!email || !password) {
      showError('Completa todos los campos');
      return;
    }

    btnLogin.classList.add('loading');
    btnLogin.disabled = true;
    errorEl.classList.remove('visible');

    // Simula latencia de red (reemplazar por fetch real)
    await new Promise(r => setTimeout(r, 900));

    const user = ADMIN_CREDENTIALS.find(u => u.email === email && u.password === password);

    if (user) {
      // Guardar sesión simulada
      sessionStorage.setItem('admin_session', JSON.stringify({
        nombre: user.nombre,
        email:  user.email,
        rol:    user.rol,
        loginAt: new Date().toISOString()
      }));
      window.location.href = 'admin-panel.html';
    } else {
      btnLogin.classList.remove('loading');
      btnLogin.disabled = false;
      showError('Correo o contraseña incorrectos');
      passEl.classList.add('error');
    }
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorEl.classList.add('visible');
  }

  btnLogin.addEventListener('click', handleLogin);
  [emailEl, passEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); }));
  passEl.addEventListener('input', () => passEl.classList.remove('error'));
</script>

</body>
</html>
